# JVM
org.gradle.jvmargs=-Xmx1024m -Xms128m -XX:MaxMetaspaceSize=512m

# AAPT2 del sistema
android.aapt2FromMavenOverride=false
android.aapt2ExecutablePath=/data/data/com.termux/files/usr/bin/aapt2

# Desactivar daemon de AAPT2
android.aapt2Daemon=false

# Desactivar configuración en caché (limpio)
org.gradle.configuration-cache=false

# Desactivar paralelismo (más estable en Termux)
org.gradle.parallel=false
